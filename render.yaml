services:
  - type: web
    name: knullcmd
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false
      - key: NEON_DATABASE_URL
        sync: false
      - key: NEON_DATABASE_URL_UNPOOLED
        sync: false
